name: Auto Deploy to Mint

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Create .env file
        run: |
          echo "SECRET_ACCESS_KEY=${{ secrets.SECRET_ACCESS_KEY }}" >> .env
          echo "TG_BOT_TOKEN=${{ secrets.TG_BOT_TOKEN }}" >> .env
          echo "TG_CHAT_ID=${{ secrets.TG_CHAT_ID }}" >> .env
          echo "TUNNEL_TOKEN=${{ secrets.TUNNEL_TOKEN }}" >> .env
          echo "CF_ZONE_ID=${{ secrets.CF_ZONE_ID }}" >> .env
          echo "CF_API_TOKEN=${{ secrets.CF_API_TOKEN }}" >> .env

      - name: Build and Restart Docker
        run: |
          /usr/bin/docker compose up -d --build --remove-orphans